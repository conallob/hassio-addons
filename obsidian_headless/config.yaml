name: Obsidian Headless
version: "0.0.6"
slug: obsidian_headless
description: >-
  Syncs your Obsidian vault via Obsidian Sync (headless daemon). Optionally
  exposes the vault as a remote MCP server with bearer-token or OAuth 2.1
  authentication. Supports Tailscale and direct HTTPS access.
url: https://github.com/conallob/hassio-obsidian-headless
image: ghcr.io/conallob/hassio-obsidian-headless
icon: true
logo: true
arch:
  - aarch64
  - amd64
init: false
homeassistant_api: false
host_network: false

ports:
  8420/tcp: 8420
  8421/tcp: 8421
  8422/tcp: 8422

ports_description:
  8420/tcp: MCP HTTP server (obsidian-vault-mcp, streamable-HTTP transport)
  8421/tcp: reMarkable device registration UI (open in browser to pair your tablet)
  8422/tcp: Obsidian token generator UI (open in browser to get your obsidian_auth_token)

map:
  - type: share
    path: /share/obsidian-vault
    read_only: false
  - type: ssl
    read_only: true

options:
  # --- Obsidian Sync ---
  # Find your API token in the Obsidian desktop app:
  #   Settings → General → Account → Copy API token
  obsidian_auth_token: ""

  # Name of the remote vault to sync (from ob sync-list-remote)
  vault_name: ""

  # E2E encryption password — only required if your vault uses end-to-end encryption
  vault_password: ""

  # --- MCP server (opt-in) ---
  enable_mcp: false

  # MCP auth — required when enable_mcp is true.
  # Bearer-token mode: set mcp_auth_token to a long random secret.
  # OAuth mode: set oauth_client_secret (and optionally oauth_client_id).
  # Both can be set simultaneously.
  mcp_auth_token: ""
  oauth_client_id: "vault-mcp-client"
  oauth_client_secret: ""

  # --- Tunnel mode (only relevant when enable_mcp is true) ---
  # "none"      — port 8420 exposed directly (use HA firewall / VPN)
  # "tailscale" — add-on joins your tailnet; port not needed externally
  # "https"     — set tls_cert_path/tls_key_path; add-on expects a reverse proxy
  tunnel_mode: "none"

  # Tailscale options (only if tunnel_mode = tailscale)
  tailscale_auth_key: ""

  # Direct HTTPS options (only if tunnel_mode = https)
  tls_cert_path: "/ssl/fullchain.pem"
  tls_key_path: "/ssl/privkey.pem"

  # --- reMarkable sync (opt-in) ---
  enable_remarkable: false

  # Device token from your reMarkable account.
  # Obtain by running `rmapi` (https://github.com/ddvk/rmapi) on any machine,
  # completing the one-time device registration, then copying the token from
  # ~/.rmapi (the "devicetoken" field).
  remarkable_device_token: ""

  # Sub-folder within the Obsidian vault where reMarkable notes are written.
  remarkable_output_dir: "reMarkable"

  # How often to poll for new/updated documents (seconds).
  remarkable_sync_interval: 300

  # --- Home Assistant OCR (optional, for handwritten notebooks) ---
  # Full URL to a HA webhook or REST endpoint that accepts
  # {"image": "<base64-encoded PNG>"} and returns {"text": "..."}.
  # Example: http://homeassistant.local:8123/api/webhook/remarkable-ocr
  ha_ocr_url: ""

  # Long-lived HA access token (not needed for unauthenticated webhooks).
  ha_ocr_token: ""

  # Optional: HA image_processing entity_id to pass in the OCR payload.
  ha_ocr_entity: ""

schema:
  obsidian_auth_token: str?
  vault_name: str
  vault_password: password?
  enable_mcp: bool
  mcp_auth_token: password?
  oauth_client_id: str?
  oauth_client_secret: password?
  tunnel_mode: "list(none|tailscale|https)"
  tailscale_auth_key: password?
  tls_cert_path: str?
  tls_key_path: str?
  enable_remarkable: bool
  remarkable_device_token: password?
  remarkable_output_dir: str?
  remarkable_sync_interval: int?
  ha_ocr_url: str?
  ha_ocr_token: password?
  ha_ocr_entity: str?
