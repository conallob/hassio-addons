name: Generate README

on:
  push:
    branches:
      - main
      - master
    paths:
      - '**/config.yaml'
      - '**/README.md'
      - '**/DOCS.md'
      - 'repository.json'
      - 'repository.yaml'
      - '.github/scripts/generate-readme.py'
      - '.github/workflows/generate-readme.yml'
  workflow_dispatch:

jobs:
  generate:
    name: Generate README.md
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate README.md
        run: python3 .github/scripts/generate-readme.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "README.md is already up to date — no commit needed."
          else
            git commit -m "docs: auto-generate README.md from add-on metadata"
            git push origin HEAD
          fi
