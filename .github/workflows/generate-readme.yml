name: Generate README

on:
  push:
    branches:
      - main
      - master
    paths:
      - '**/config.yaml'
      - '**/README.md'
      - '**/DOCS.md'
      - 'repository.json'
      - 'repository.yaml'
      - '.github/workflows/generate-readme.yml'
  workflow_dispatch:

jobs:
  generate:
    name: Generate README.md
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate README.md
        run: |
          python3 - <<'PYEOF'
          import os
          import yaml

          HEADER = """\
# Conall's Home Assistant Add-ons

My personal collection of add-ons for [Home Assistant](https://www.home-assistant.io/).

## Installation

Add this repository to your Home Assistant add-on store:

[![Add repository](https://my.home-assistant.io/badges/supervisor_add_addon_repository.svg)](https://my.home-assistant.io/redirect/supervisor_add_addon_repository/?repository_url=https%3A%2F%2Fgithub.com%2Fconallob%2Fhassio-addons)

Or manually: **Settings → Add-ons → Add-on Store → ⋮ → Repositories** and add `https://github.com/conallob/hassio-addons`.

---

## Add-ons

"""

          def find_addons():
              addons = []
              for entry in sorted(os.listdir(".")):
                  if not os.path.isdir(entry) or entry.startswith("."):
                      continue
                  config_path = os.path.join(entry, "config.yaml")
                  if not os.path.exists(config_path):
                      continue
                  with open(config_path) as f:
                      config = yaml.safe_load(f)
                  addons.append((entry, config))
              return addons

          def read_addon_docs(directory):
              # Prefer DOCS.md (HA convention) then README.md
              for fname in ("DOCS.md", "README.md"):
                  p = os.path.join(directory, fname)
                  if os.path.exists(p):
                      with open(p) as f:
                          return f.read().strip()
              return None

          def addon_section(directory, config):
              name = config.get("name", directory)
              version = str(config.get("version", ""))
              description = config.get("description", "")
              external_image = config.get("image")
              source_url = config.get("url")

              # Link heading to source repo if available, else local subdirectory
              link = source_url if source_url else f"./{directory}"
              lines = [f"### [{name}]({link})", ""]

              meta = []
              if version:
                  meta.append(f"**Version**: {version}")
              if external_image:
                  meta.append(f"**Image**: external (`{external_image}`)")
              if meta:
                  lines.append("  ".join(meta))
                  lines.append("")

              if description:
                  lines.append(description)
                  lines.append("")

              if external_image and source_url:
                  lines.append(
                      f"> The container image for this add-on is built and published by "
                      f"[{source_url}]({source_url}). "
                      f"Only the Home Assistant add-on metadata is hosted in this repository."
                  )
                  lines.append("")

              docs = read_addon_docs(directory)
              if docs:
                  doc_lines = docs.splitlines()
                  # Strip leading H1 — it duplicates the section heading
                  if doc_lines and doc_lines[0].startswith("# "):
                      doc_lines = doc_lines[1:]
                  # Strip leading blank lines
                  while doc_lines and not doc_lines[0].strip():
                      doc_lines = doc_lines[1:]
                  # Demote all headings by one level so they nest under H3
                  doc_lines = [("#" + l if l.startswith("#") else l) for l in doc_lines]
                  lines.extend(doc_lines)
                  lines.append("")

              lines.append("---")
              lines.append("")
              return "\n".join(lines)

          addons = find_addons()
          body = HEADER + "".join(addon_section(d, c) for d, c in addons)
          body = body.rstrip() + "\n"

          with open("README.md", "w") as f:
              f.write(body)

          print(f"Generated README.md with {len(addons)} add-on(s):")
          for d, c in addons:
              image_note = " (external image)" if c.get("image") else ""
              print(f"  {d}: {c.get('name', '?')} v{c.get('version', '?')}{image_note}")
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "README.md is already up to date — no commit needed."
          else
            git commit -m "docs: auto-generate README.md from add-on metadata"
            git push origin HEAD
          fi
