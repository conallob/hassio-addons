name: "Vector"
description: "High-performance observability data pipeline"
version: "0.56.0"
slug: "vector"
init: false
arch:
  - aarch64
  - amd64
image: "ghcr.io/conallob/vector-{arch}"
url: "https://github.com/conallob/hassio-addons/tree/master/vector"
panel_icon: "mdi:chart-timeline-variant"
startup: services
ingress: true
ingress_port: 8686
ports:
  8686/tcp: null
  514/tcp: null
  514/udp: null
  6000/tcp: null
  6000/udp: null
  9000/tcp: null
ports_description:
  8686/tcp: "Vector API (used by the ingress panel; also usable for direct external access)"
  514/tcp: "Standard syslog TCP listener (enable via syslog_enabled)"
  514/udp: "Standard syslog UDP listener (enable via syslog_enabled)"
  6000/tcp: "Available for a syslog TCP source on a custom port, if defined in vector_config"
  6000/udp: "Available for a syslog UDP source on a custom port, if defined in vector_config"
  9000/tcp: "Available for a Vector-to-Vector source, if defined in vector_config"
map:
  - config:rw
  - share:rw
  - ssl:ro

options:
  log_level: "info"
  api_enabled: true
  syslog_enabled: false
  vector_config: |
    sources:
      ha_logs:
        type: file
        include:
          - /config/home-assistant.log
        read_from: beginning
        line_delimiter: "\n"

    sinks:
      console:
        type: console
        inputs:
          - ha_logs
        target: stdout
        encoding:
          codec: json

schema:
  log_level: "list(trace|debug|info|notice|warning|error|fatal)"
  api_enabled: bool
  syslog_enabled: bool
  vector_config: "str?"

environment:
  LOG_FORMAT: "text"
