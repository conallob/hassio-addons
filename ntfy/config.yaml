name: "ntfy"
description: "Self-hosted push notification server with optional SSL support via the HA Let's Encrypt add-on"
version: "2.11.3"
slug: "ntfy"
init: false
arch:
  - aarch64
  - amd64
url: "https://github.com/conallob/hassio-addons/tree/master/ntfy"
panel_icon: "mdi:bell-ring"
startup: services
ingress: true
ingress_port: 2586
ports:
  443/tcp: null
ports_description:
  443/tcp: "ntfy HTTPS API (optional, requires ssl: true and certificates from the HA Let's Encrypt add-on)"
map:
  - config:rw
  - share:rw
  - ssl:ro
options:
  domain: ""
  ssl: false
  certfile: "ntfy.pem"
  keyfile: "ntfy.key"
  auth_default_access: "read-write"
  upstream_base_url: "https://ntfy.sh"
  log_level: "info"
schema:
  domain: "str?"
  ssl: bool
  certfile: str
  keyfile: str
  auth_default_access: "list(read-write|read-only|write-only|deny-all)"
  upstream_base_url: "url?"
  log_level: "list(trace|debug|info|warn|error)"
