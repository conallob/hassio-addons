name: "Grafana Alloy"
description: "Grafana Alloy observability collector — scrape Home Assistant Prometheus metrics and/or forward logs to Loki"
version: "1.8.3"
slug: "alloy"
init: false
arch:
  - aarch64
  - amd64
url: "https://github.com/conallob/hassio-addons/tree/master/alloy"
panel_icon: "mdi:chart-areaspline"
startup: services
ingress: true
ingress_port: 12345
ports:
  12345/tcp: null
ports_description:
  12345/tcp: "Alloy UI and HTTP API (optional, for direct external access)"
map:
  - config:rw
  - share:rw
  - ssl:ro
options:
  log_level: "info"
  collect_prometheus: true
  collect_logs: false
  prometheus_scrape_interval: "60s"
  loki_url: ""
  remote_write_url: ""
  remote_write_username: ""
  remote_write_password: ""
  alloy_config: ""
schema:
  log_level: "list(trace|debug|info|warn|error)"
  collect_prometheus: bool
  collect_logs: bool
  prometheus_scrape_interval: str
  loki_url: "url?"
  remote_write_url: "url?"
  remote_write_username: "str?"
  remote_write_password: "str?"
  alloy_config: "str?"
